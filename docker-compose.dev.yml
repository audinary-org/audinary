services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_NAME:-audinary}
      - POSTGRES_USER=${DB_USER:-audinary}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-audinary}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./server:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - backend_vendor:/var/www/html/vendor
    environment:
      - DB_HOST=postgres
      - DB_NAME=${DB_NAME:-audinary}
      - DB_USER=${DB_USER:-audinary}
      - DB_PASSWORD=${DB_PASSWORD:-audinary}
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-do-not-use-in-production}
    command: >
      sh -c "cd /var/www/html
      && composer install --no-interaction
      && php scripts/run_migrations.php
      && exec /usr/bin/supervisord -c /etc/supervisor/conf.d/supervisord.conf"

  frontend:
    image: node:25-alpine
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - API_URL=http://backend:8080
      - WS_URL=ws://backend:8080
    command: sh -c "npm install && npm run dev"

volumes:
  pgdata:
  backend_vendor:
  frontend_node_modules:
