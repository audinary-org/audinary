services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_NAME:-audinary}
      - POSTGRES_USER=${DB_USER:-audinary}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-audinary}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: trafex/php-nginx:3.11.1
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./server:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker-entrypoint.sh:/usr/local/bin/docker-entrypoint.sh:ro
    environment:
      - DB_HOST=postgres
      - DB_NAME=${DB_NAME:-audinary}
      - DB_USER=${DB_USER:-audinary}
      - DB_PASSWORD=${DB_PASSWORD:-audinary}
    entrypoint: ["/usr/local/bin/docker-entrypoint.sh"]

  frontend:
    image: node:25-alpine
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev"

volumes:
  pgdata:
  frontend_node_modules:
